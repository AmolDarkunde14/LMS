<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dashboard-body">
    <nav class="navbar glass-nav">
        <h2>LMS Dashboard</h2>
        <div class="nav-links">
            <span id="userRoleBadge" class="badge"></span>
            <button id="logoutBtn" class="btn-secondary">Logout</button>
        </div>
    </nav>

    <main class="container">
        <section class="panel">
            <div class="panel-header">
                <h3>Available Books</h3>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search title or category...">
                </div>
            </div>
            <div class="table-container">
                <table id="booksTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Category</th>
                            <th>Available</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="booksList">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h3>Transaction History</h3>
                <button id="refreshTxBtn" class="btn-icon">↻</button>
            </div>
            <div class="table-container">
                <table id="transactionsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Book</th>
                            <th>Member ID</th>
                            <th>Status</th>
                            <th>Issue Date</th>
                            <th>Due Date</th>
                            <th>Fine ($)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsList">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal for Actions -->
    <div id="actionModal" class="modal hidden">
        <div class="modal-content glass-box">
            <span class="close-btn" id="closeModal">&times;</span>
            <h3 id="modalTitle">Action</h3>
            <p id="modalDesc"></p>
            <div class="input-group hidden" id="memberInputGroup">
                <label>Member ID</label>
                <input type="number" id="memberIdInput" value="3" placeholder="Enter Member Profile ID (e.g. 3)">
            </div>
            <input type="hidden" id="activeBookId">
            <input type="hidden" id="activeTxId">
            <button id="confirmActionBtn" class="btn-primary">Confirm</button>
            <p id="actionMsg"></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
